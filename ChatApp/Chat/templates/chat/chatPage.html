<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multo Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #262626;
      --white: #FFFFFF;
      --light-gray: #FAFAFA;
      --dark-gray: #000000;
      --bubble-left: #E4E6EB;
      --bubble-right: #3797F0;
      --text-bubble-right: var(--white);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      height: 100vh;
      background: var(--white);
      color: var(--dark-gray);
      overflow: hidden;
    }

    .sidebar {
      width: 250px;
      border-right: 1px solid #ddd;
      background: var(--light-gray);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .brand {
      font-size: 20px;
      font-weight: bold;
      padding: 16px;
    }

    .user-list {
      list-style: none;
      flex-grow: 1;
    }

    .user-list li {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    .user-list li:hover {
      background: #eee;
    }

    .sidebar a {
      padding: 16px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 16px;
      font-weight: 600;
      font-size: 18px;
      border-bottom: 1px solid #ddd;
      background: var(--white);
      text-align: center;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--light-gray);
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 22px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.left {
      align-self: flex-start;
      background: var(--bubble-left);
    }

    .message.right {
      align-self: flex-end;
      background: var(--bubble-right);
      color: var(--text-bubble-right);
    }

    .message small {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      opacity: 0.6;
    }

    .chat-input-area {
      display: flex;
      padding: 12px 16px;
      border-top: 1px solid #ddd;
      background: var(--white);
      gap: 8px;
    }

    .chat-input-area input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 22px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .chat-input-area button {
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="brand">MultoChat</div>
    <ul class="user-list">
      {% for user in users %}
        {% if user.username != request.user.username and user.is_authenticated %}
          <li onclick="selectUser('{{ user.username }}')">{{ user.username }}</li>
        {% endif %}
      {% endfor %}
    </ul>
    {% if request.user.is_authenticated %}
    <a href="{% url 'logout' %}">Logout</a>
    {% endif %}
  </div>

  <div class="chat-area">
    <div class="chat-header" id="chatHeader">
      Select a user to chat
    </div>
    <div class="chat-messages" id="id_chat_item_container"></div>
    <div class="chat-input-area">
      <input type="text" id="id_message_send_input" placeholder="Message..." />
      <button id="id_message_send_button" disabled>Send</button>
    </div>
  </div>

  <script>
    const socket = new WebSocket("ws://" + window.location.host + "/");
    const input = document.getElementById("id_message_send_input");
    const button = document.getElementById("id_message_send_button");
    const container = document.getElementById("id_chat_item_container");
    const chatHeader = document.getElementById("chatHeader");
    let currentUser = "{{ request.user.username }}";
    let currentChatUser = null;

    function selectUser(user) {
      currentChatUser = user;
      chatHeader.textContent = `Chatting with ${user}`;
      container.innerHTML = '';
    }

    socket.onopen = () => console.log("WebSocket connected.");
    socket.onclose = () => console.error("WebSocket disconnected.");

    input.addEventListener("input", () => button.disabled = input.value.trim() === "");
    input.addEventListener("keyup", e => e.key === "Enter" && !button.disabled && button.click());

    button.onclick = () => {
      if (!currentChatUser) return alert("Select a user to chat with.");
      const message = input.value.trim();
      if (!message) return;
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      socket.send(JSON.stringify({ message, username: currentUser, time, to: currentChatUser }));
      appendMessage(message, currentUser, time, true);
      input.value = "";
      button.disabled = true;
      input.focus();
    };

    socket.onmessage = e => {
      const { message, username, time, to } = JSON.parse(e.data);
      if (currentChatUser !== username && currentChatUser !== to) return;
      const isSelf = username === currentUser;
      appendMessage(message, username, time, isSelf);
    };

    function appendMessage(message, username, time, isSelf) {
      const msgDiv = document.createElement("div");
      msgDiv.className = "message " + (isSelf ? "right" : "left");
      msgDiv.innerHTML = `<span>${message}</span><small>${username} • ${time}</small>`;
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
    }
  </script>
</body>
</html>
